<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VUMC Sermon Podcast</title>

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#f4f6fb;
      --card:#ffffff;
      --text:#222222;
      --muted:#666666;
      --border:#e5e7eb;
      --accent:#6f4ef6;
      --accent-dark:#5d3fe0;
      --shadow:0 10px 25px rgba(0,0,0,.08);
      --radius:18px;
      --maxw:1100px;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:var(--maxw);
      margin:0 auto;
      padding:30px 16px 50px;
    }

    .hero{
      background:var(--card);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:30px 24px;
      text-align:center;
      margin-bottom:24px;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:2rem;
      line-height:1.15;
    }

    .hero p{
      margin:0 auto;
      max-width:720px;
      color:var(--muted);
      line-height:1.6;
      font-size:1rem;
    }

    .buttons{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      margin-top:18px;
    }

    .btn{
      display:inline-block;
      text-decoration:none;
      background:var(--accent);
      color:#fff;
      padding:11px 16px;
      border-radius:999px;
      font-weight:700;
      font-size:.95rem;
      transition:.2s ease;
    }

    .btn:hover{
      background:var(--accent-dark);
      transform:translateY(-1px);
    }

    .btn.alt{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    .status{
      text-align:center;
      color:var(--muted);
      margin:12px 0 20px;
      font-size:.98rem;
    }

    .error{
      background:#fff1f2;
      color:#9f1239;
      border:1px solid #fecdd3;
      padding:14px;
      border-radius:14px;
      text-align:center;
      margin:0 0 20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(290px, 1fr));
      gap:20px;
    }

    .card{
      background:var(--card);
      border-radius:18px;
      overflow:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
    }

    .thumb-wrap{
      aspect-ratio:16 / 9;
      background:#eceff5;
      overflow:hidden;
    }

    .thumb{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .thumb-fallback{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#6b7280;
      font-weight:700;
      font-size:1rem;
    }

    .content{
      padding:16px;
    }

    .title{
      font-size:1.08rem;
      font-weight:700;
      line-height:1.35;
      margin:0 0 6px;
    }

    .meta{
      color:#777;
      font-size:.9rem;
      margin-bottom:10px;
    }

    .desc{
      color:#444;
      font-size:.94rem;
      line-height:1.55;
      margin-bottom:12px;
    }

    audio{
      width:100%;
      margin-top:2px;
    }

    .links{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
    }

    .links a{
      color:var(--accent-dark);
      text-decoration:none;
      font-size:.92rem;
      font-weight:700;
    }

    .footer-note{
      text-align:center;
      color:var(--muted);
      font-size:.88rem;
      line-height:1.5;
      margin-top:26px;
    }

    @media (max-width:640px){
      .hero h1{
        font-size:1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <section class="hero">
      <h1>VUMC Sermon Podcast</h1>
      <p>
        Listen to recent sermons and messages from Versailles United Methodist Church.
        New episodes appear automatically from our podcast feed.
      </p>

      <div class="buttons">
        <!-- Replace the Apple link below with your actual Apple Podcasts show page when ready -->
        <a class="btn" href="https://podcasts.apple.com/" target="_blank" rel="noopener">Apple Podcasts</a>
        <a class="btn alt" href="https://open.spotify.com/show/5euyxMvYOhMD9cD6tHa2Dd" target="_blank" rel="noopener">Spotify</a>
        <a class="btn alt" href="https://www.iheart.com/podcast/269-versailles-umc-church-beyo-283209729/" target="_blank" rel="noopener">iHeartRadio</a>
      </div>
    </section>

    <div id="status" class="status">Loading sermons...</div>
    <div id="errorBox"></div>
    <div id="episodes" class="grid"></div>

    <div class="footer-note">
      Sermons update automatically from the podcast RSS feed.
    </div>
  </div>

  <script>
    const RSS_FEED = "https://anchor.fm/s/102cd8e28/podcast/rss";
    const FEED_API = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(RSS_FEED);

    const statusEl = document.getElementById("status");
    const errorBox = document.getElementById("errorBox");
    const episodesEl = document.getElementById("episodes");

    function stripHtml(html) {
      const div = document.createElement("div");
      div.innerHTML = html || "";
      return (div.textContent || div.innerText || "").trim();
    }

    function truncate(text, max = 190) {
      if (!text) return "";
      return text.length > max ? text.slice(0, max).trim() + "..." : text;
    }

    function formatDate(dateString) {
      const d = new Date(dateString);
      if (isNaN(d)) return "";
      return d.toLocaleDateString("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    }

    function getAudioUrl(item) {
      if (item.enclosure && item.enclosure.link) return item.enclosure.link;

      const match = (item.description || "").match(
        /https?:\/\/[^"'\s>]+\.(mp3|m4a|aac|wav)(\?[^"'\s>]*)?/i
      );
      return match ? match[0] : "";
    }

    function renderEpisodes(items, feed) {
      statusEl.textContent = `Showing ${items.length} recent sermons`;

      const fallbackImage = feed?.image || "";

      episodesEl.innerHTML = items.map(item => {
        const title = item.title || "Untitled Episode";
        const pubDate = formatDate(item.pubDate);
        const description = truncate(stripHtml(item.description), 190);
        const audioUrl = getAudioUrl(item);
        const image = item.thumbnail || fallbackImage || "";
        const episodeLink = item.link || "#";

        return `
          <article class="card">
            <div class="thumb-wrap">
              ${
                image
                  ? `<img class="thumb" src="${image}" alt="${title.replace(/"/g, "&quot;")}">`
                  : `<div class="thumb-fallback">VUMC Podcast</div>`
              }
            </div>

            <div class="content">
              <h2 class="title">${title}</h2>
              <div class="meta">${pubDate}</div>
              <div class="desc">${description}</div>

              ${
                audioUrl
                  ? `<audio controls preload="none" src="${audioUrl}"></audio>`
                  : `<div class="meta">Audio unavailable for this episode.</div>`
              }

              <div class="links">
                <a href="${episodeLink}" target="_blank" rel="noopener">Open episode</a>
                ${
                  audioUrl
                    ? `<a href="${audioUrl}" target="_blank" rel="noopener">Direct audio</a>`
                    : ""
                }
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function showError(message) {
      statusEl.textContent = "Unable to load sermons";
      errorBox.innerHTML = `<div class="error">${message}</div>`;
    }

    async function loadFeed() {
      try {
        const res = await fetch(FEED_API);
        if (!res.ok) throw new Error("Feed request failed.");

        const data = await res.json();
        if (data.status !== "ok" || !Array.isArray(data.items)) {
          throw new Error("Podcast feed could not be parsed.");
        }

        renderEpisodes(data.items.slice(0, 12), data.feed);
      } catch (err) {
        console.error(err);
        showError("The podcast feed could not be loaded. If this continues, the feed service may be temporarily unavailable.");
      }
    }

    loadFeed();
  </script>
</body>
</html>
